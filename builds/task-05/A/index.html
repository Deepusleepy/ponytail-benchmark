<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Todo</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1f2430;
    --muted: #8a91a0;
    --line: #e6e8ee;
    --accent: #4f6bed;
    --accent-soft: #eef1fe;
    --danger: #e25563;
    --done: #aab0bd;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.4;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 20px;
    text-align: center;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 6px 24px rgba(31, 36, 48, 0.06);
    overflow: hidden;
  }

  .add-row {
    display: flex;
    gap: 8px;
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }

  #new-todo {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  #new-todo:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  #new-todo::placeholder { color: var(--muted); }

  #add-btn {
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 0 18px;
    border-radius: 9px;
    cursor: pointer;
    transition: background .15s, transform .05s;
  }

  #add-btn:hover { background: #3f59d6; }
  #add-btn:active { transform: scale(0.97); }

  ul.list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  li.todo {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
  }

  li.todo:last-child { border-bottom: none; }

  .check {
    appearance: none;
    -webkit-appearance: none;
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
    border: 2px solid var(--line);
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: border-color .15s, background .15s;
  }

  .check:hover { border-color: var(--accent); }

  .check:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check:checked::after {
    content: "";
    position: absolute;
    left: 6px;
    top: 2px;
    width: 4px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .label {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
    cursor: default;
  }

  li.todo.completed .label {
    text-decoration: line-through;
    color: var(--done);
  }

  .delete {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    opacity: 0;
    transition: background .15s, color .15s, opacity .15s;
  }

  li.todo:hover .delete { opacity: 1; }
  .delete:hover { background: #fbe9eb; color: var(--danger); }

  .empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--muted);
  }

  .filters {
    display: flex;
    gap: 4px;
  }

  .filter {
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }

  .filter:hover { color: var(--text); }

  .filter.active {
    background: var(--accent-soft);
    color: var(--accent);
  }

  #clear-completed {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 5px 6px;
    border-radius: 7px;
  }

  #clear-completed:hover { color: var(--danger); }
  #clear-completed:disabled {
    color: var(--line);
    cursor: default;
  }

  #count strong { color: var(--text); }
</style>
</head>
<body>
  <main class="app">
    <h1>Todo</h1>
    <section class="card">
      <form class="add-row" id="add-form" autocomplete="off">
        <input id="new-todo" type="text" placeholder="What needs to be done?" aria-label="New todo" />
        <button id="add-btn" type="submit">Add</button>
      </form>

      <ul class="list" id="list"></ul>

      <div class="footer">
        <span id="count"></span>
        <div class="filters">
          <button class="filter" data-filter="all" type="button">All</button>
          <button class="filter" data-filter="active" type="button">Active</button>
          <button class="filter" data-filter="completed" type="button">Completed</button>
        </div>
        <button id="clear-completed" type="button">Clear completed</button>
      </div>
    </section>
  </main>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "todos.v1";
  var FILTER_KEY = "todos.filter.v1";

  var form = document.getElementById("add-form");
  var input = document.getElementById("new-todo");
  var list = document.getElementById("list");
  var countEl = document.getElementById("count");
  var clearBtn = document.getElementById("clear-completed");
  var filterBtns = Array.prototype.slice.call(document.querySelectorAll(".filter"));

  var todos = load();
  var filter = loadFilter();

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed
        .filter(function (t) { return t && typeof t.text === "string"; })
        .map(function (t) {
          return {
            id: typeof t.id === "string" ? t.id : uid(),
            text: t.text,
            completed: !!t.completed
          };
        });
    } catch (e) {
      return [];
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) {}
  }

  function loadFilter() {
    var f = null;
    try { f = localStorage.getItem(FILTER_KEY); } catch (e) {}
    return (f === "active" || f === "completed") ? f : "all";
  }

  function saveFilter() {
    try { localStorage.setItem(FILTER_KEY, filter); } catch (e) {}
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.push({ id: uid(), text: text, completed: false });
    save();
    render();
  }

  function toggleTodo(id) {
    todos.forEach(function (t) {
      if (t.id === id) t.completed = !t.completed;
    });
    save();
    render();
  }

  function deleteTodo(id) {
    todos = todos.filter(function (t) { return t.id !== id; });
    save();
    render();
  }

  function clearCompleted() {
    todos = todos.filter(function (t) { return !t.completed; });
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    saveFilter();
    render();
  }

  function visibleTodos() {
    if (filter === "active") {
      return todos.filter(function (t) { return !t.completed; });
    }
    if (filter === "completed") {
      return todos.filter(function (t) { return t.completed; });
    }
    return todos;
  }

  function render() {
    // filter buttons
    filterBtns.forEach(function (btn) {
      btn.classList.toggle("active", btn.getAttribute("data-filter") === filter);
    });

    // list
    list.innerHTML = "";
    var visible = visibleTodos();

    if (visible.length === 0) {
      var li = document.createElement("li");
      li.className = "empty";
      if (todos.length === 0) {
        li.textContent = "No todos yet. Add one above.";
      } else if (filter === "active") {
        li.textContent = "No active todos.";
      } else if (filter === "completed") {
        li.textContent = "No completed todos.";
      } else {
        li.textContent = "Nothing here.";
      }
      list.appendChild(li);
    } else {
      visible.forEach(function (t) {
        list.appendChild(renderItem(t));
      });
    }

    // counter
    var remaining = todos.filter(function (t) { return !t.completed; }).length;
    countEl.innerHTML = "<strong>" + remaining + "</strong> item" +
      (remaining === 1 ? "" : "s") + " left";

    // clear completed enabled state
    var hasCompleted = todos.some(function (t) { return t.completed; });
    clearBtn.disabled = !hasCompleted;
  }

  function renderItem(t) {
    var li = document.createElement("li");
    li.className = "todo" + (t.completed ? " completed" : "");
    li.setAttribute("data-id", t.id);

    var check = document.createElement("input");
    check.type = "checkbox";
    check.className = "check";
    check.checked = t.completed;
    check.setAttribute("aria-label", "Toggle " + t.text);
    check.addEventListener("change", function () { toggleTodo(t.id); });

    var label = document.createElement("span");
    label.className = "label";
    label.textContent = t.text;

    var del = document.createElement("button");
    del.className = "delete";
    del.type = "button";
    del.innerHTML = "&times;";
    del.setAttribute("aria-label", "Delete " + t.text);
    del.addEventListener("click", function () { deleteTodo(t.id); });

    li.appendChild(check);
    li.appendChild(label);
    li.appendChild(del);
    return li;
  }

  // events
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    addTodo(input.value);
    input.value = "";
    input.focus();
  });

  clearBtn.addEventListener("click", clearCompleted);

  filterBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      setFilter(btn.getAttribute("data-filter"));
    });
  });

  render();
})();
</script>
</body>
</html>
