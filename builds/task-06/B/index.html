<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181b24;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #6366f1;
    --accent-2: #22d3ee;
    --green: #34d399;
    --grid: #2a3040;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1120px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }

  header.page {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }

  header.page h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.4px;
  }

  header.page .sub {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
  }

  .period {
    font-size: 13px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
  }

  /* KPI cards */
  .kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 24px;
  }

  .kpi {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .kpi::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--accent);
  }
  .kpi.users::after { background: var(--accent-2); }
  .kpi.best::after { background: var(--green); }

  .kpi .label {
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .kpi .value {
    font-size: 30px;
    font-weight: 700;
    margin-top: 10px;
    letter-spacing: -0.5px;
  }

  .kpi .meta {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  /* Chart panels */
  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px 14px;
    box-shadow: var(--shadow);
  }

  .card h2 {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 2px;
  }

  .card .hint {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 14px;
  }

  .chart-holder { width: 100%; }
  svg { display: block; width: 100%; height: auto; }

  .bar-rect { transition: opacity 0.15s ease; }
  .bar-rect:hover { opacity: 0.82; }

  .tick-text { fill: var(--muted); font-size: 11px; }
  .axis-line { stroke: var(--grid); stroke-width: 1; }
  .grid-line { stroke: var(--grid); stroke-width: 1; stroke-dasharray: 3 4; opacity: 0.6; }
  .bar-label { fill: var(--text); font-size: 11px; font-weight: 600; }
  .dot-label { fill: var(--text); font-size: 11px; font-weight: 600; }

  footer.note {
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  @media (max-width: 820px) {
    .kpis { grid-template-columns: 1fr; }
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <div>
      <h1>Sales Dashboard</h1>
      <div class="sub">Revenue &amp; user performance overview</div>
    </div>
    <div class="period">Jan – Jun 2026</div>
  </header>

  <section class="kpis" id="kpis"></section>

  <section class="charts">
    <div class="card">
      <h2>Monthly Revenue</h2>
      <p class="hint">Total revenue per month (USD)</p>
      <div class="chart-holder" id="barChart"></div>
    </div>
    <div class="card">
      <h2>Monthly Users</h2>
      <p class="hint">Active users per month</p>
      <div class="chart-holder" id="lineChart"></div>
    </div>
  </section>

  <footer class="note">Charts rendered with hand-drawn SVG — no charting library.</footer>
</div>

<script>
  "use strict";

  var DATA = [
    { month: "Jan", revenue: 42000, users: 1200 },
    { month: "Feb", revenue: 38500, users: 1100 },
    { month: "Mar", revenue: 51200, users: 1450 },
    { month: "Apr", revenue: 47800, users: 1380 },
    { month: "May", revenue: 61000, users: 1720 },
    { month: "Jun", revenue: 58300, users: 1650 }
  ];

  var SVG_NS = "http://www.w3.org/2000/svg";

  function el(tag, attrs, text) {
    var node = document.createElementNS(SVG_NS, tag);
    if (attrs) {
      for (var k in attrs) {
        if (Object.prototype.hasOwnProperty.call(attrs, k)) {
          node.setAttribute(k, attrs[k]);
        }
      }
    }
    if (text != null) node.textContent = text;
    return node;
  }

  function fmtUSD(n) {
    return "$" + Math.round(n).toLocaleString("en-US");
  }
  function fmtUSDk(n) {
    return "$" + (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + "k";
  }
  function fmtInt(n) {
    return Math.round(n).toLocaleString("en-US");
  }

  /* ---------- KPI cards ---------- */
  function renderKpis() {
    var totalRevenue = DATA.reduce(function (s, d) { return s + d.revenue; }, 0);
    var avgUsers = DATA.reduce(function (s, d) { return s + d.users; }, 0) / DATA.length;
    var best = DATA.reduce(function (a, b) { return b.revenue > a.revenue ? b : a; }, DATA[0]);

    var cards = [
      { cls: "", label: "Total Revenue", value: fmtUSD(totalRevenue), meta: "Across " + DATA.length + " months" },
      { cls: "users", label: "Avg Monthly Users", value: fmtInt(avgUsers), meta: "Mean over period" },
      { cls: "best", label: "Best Month", value: best.month, meta: fmtUSD(best.revenue) + " revenue" }
    ];

    var host = document.getElementById("kpis");
    cards.forEach(function (c) {
      var div = document.createElement("div");
      div.className = "kpi" + (c.cls ? " " + c.cls : "");
      var l = document.createElement("div"); l.className = "label"; l.textContent = c.label;
      var v = document.createElement("div"); v.className = "value"; v.textContent = c.value;
      var m = document.createElement("div"); m.className = "meta"; m.textContent = c.meta;
      div.appendChild(l); div.appendChild(v); div.appendChild(m);
      host.appendChild(div);
    });
  }

  /* "nice" rounded upper bound for an axis */
  function niceMax(max) {
    if (max <= 0) return 1;
    var pow = Math.pow(10, Math.floor(Math.log10(max)));
    var n = max / pow;
    var nice;
    if (n <= 1) nice = 1;
    else if (n <= 2) nice = 2;
    else if (n <= 2.5) nice = 2.5;
    else if (n <= 5) nice = 5;
    else nice = 10;
    return nice * pow;
  }

  /* ---------- Bar chart (revenue) ---------- */
  function renderBarChart() {
    var W = 520, H = 320;
    var m = { top: 20, right: 16, bottom: 36, left: 56 };
    var iw = W - m.left - m.right;
    var ih = H - m.top - m.bottom;

    var maxVal = niceMax(Math.max.apply(null, DATA.map(function (d) { return d.revenue; })));
    var ticks = 5;

    var svg = el("svg", { viewBox: "0 0 " + W + " " + H, role: "img", "aria-label": "Bar chart of monthly revenue" });

    // gridlines + y labels
    for (var t = 0; t <= ticks; t++) {
      var val = (maxVal / ticks) * t;
      var y = m.top + ih - (val / maxVal) * ih;
      svg.appendChild(el("line", { x1: m.left, y1: y, x2: m.left + iw, y2: y, class: "grid-line" }));
      svg.appendChild(el("text", { x: m.left - 8, y: y + 4, "text-anchor": "end", class: "tick-text" }, fmtUSDk(val)));
    }

    // x axis baseline
    svg.appendChild(el("line", { x1: m.left, y1: m.top + ih, x2: m.left + iw, y2: m.top + ih, class: "axis-line" }));

    var slot = iw / DATA.length;
    var barW = Math.min(46, slot * 0.6);

    // gradient def
    var defs = el("defs");
    var grad = el("linearGradient", { id: "barGrad", x1: "0", y1: "0", x2: "0", y2: "1" });
    grad.appendChild(el("stop", { offset: "0%", "stop-color": "#818cf8" }));
    grad.appendChild(el("stop", { offset: "100%", "stop-color": "#4f46e5" }));
    defs.appendChild(grad);
    svg.appendChild(defs);

    DATA.forEach(function (d, i) {
      var cx = m.left + slot * i + slot / 2;
      var bh = (d.revenue / maxVal) * ih;
      var x = cx - barW / 2;
      var y = m.top + ih - bh;

      var rect = el("rect", {
        x: x, y: y, width: barW, height: bh,
        rx: 6, ry: 6, fill: "url(#barGrad)", class: "bar-rect"
      });
      var title = el("title", {}, d.month + ": " + fmtUSD(d.revenue));
      rect.appendChild(title);
      svg.appendChild(rect);

      // value on top
      svg.appendChild(el("text", { x: cx, y: y - 6, "text-anchor": "middle", class: "bar-label" }, fmtUSDk(d.revenue)));
      // x label
      svg.appendChild(el("text", { x: cx, y: m.top + ih + 20, "text-anchor": "middle", class: "tick-text" }, d.month));
    });

    document.getElementById("barChart").appendChild(svg);
  }

  /* ---------- Line chart (users) ---------- */
  function renderLineChart() {
    var W = 520, H = 320;
    var m = { top: 20, right: 18, bottom: 36, left: 56 };
    var iw = W - m.left - m.right;
    var ih = H - m.top - m.bottom;

    var users = DATA.map(function (d) { return d.users; });
    var rawMin = Math.min.apply(null, users);
    var maxVal = niceMax(Math.max.apply(null, users));
    // floor to a nice lower bound for better visual range
    var minVal = Math.floor((rawMin * 0.85) / 100) * 100;
    if (minVal < 0) minVal = 0;
    var ticks = 5;

    var svg = el("svg", { viewBox: "0 0 " + W + " " + H, role: "img", "aria-label": "Line chart of monthly users" });

    function yOf(v) {
      return m.top + ih - ((v - minVal) / (maxVal - minVal)) * ih;
    }
    var slot = iw / DATA.length;
    function xOf(i) {
      return m.left + slot * i + slot / 2;
    }

    // gridlines + y labels
    for (var t = 0; t <= ticks; t++) {
      var val = minVal + ((maxVal - minVal) / ticks) * t;
      var y = yOf(val);
      svg.appendChild(el("line", { x1: m.left, y1: y, x2: m.left + iw, y2: y, class: "grid-line" }));
      svg.appendChild(el("text", { x: m.left - 8, y: y + 4, "text-anchor": "end", class: "tick-text" }, fmtInt(val)));
    }

    // baseline
    svg.appendChild(el("line", { x1: m.left, y1: m.top + ih, x2: m.left + iw, y2: m.top + ih, class: "axis-line" }));

    // build path + area
    var linePts = DATA.map(function (d, i) { return xOf(i) + "," + yOf(d.users); });
    var lineD = "M " + linePts.join(" L ");

    var areaD = "M " + xOf(0) + "," + (m.top + ih) +
                " L " + linePts.join(" L ") +
                " L " + xOf(DATA.length - 1) + "," + (m.top + ih) + " Z";

    // gradient for area
    var defs = el("defs");
    var ag = el("linearGradient", { id: "areaGrad", x1: "0", y1: "0", x2: "0", y2: "1" });
    ag.appendChild(el("stop", { offset: "0%", "stop-color": "#22d3ee", "stop-opacity": "0.35" }));
    ag.appendChild(el("stop", { offset: "100%", "stop-color": "#22d3ee", "stop-opacity": "0" }));
    defs.appendChild(ag);
    svg.appendChild(defs);

    svg.appendChild(el("path", { d: areaD, fill: "url(#areaGrad)", stroke: "none" }));
    svg.appendChild(el("path", { d: lineD, fill: "none", stroke: "#22d3ee", "stroke-width": "2.5", "stroke-linejoin": "round", "stroke-linecap": "round" }));

    // dots, labels, x ticks
    DATA.forEach(function (d, i) {
      var cx = xOf(i), cy = yOf(d.users);
      var dot = el("circle", { cx: cx, cy: cy, r: 4.5, fill: "#0f1117", stroke: "#22d3ee", "stroke-width": "2.5" });
      dot.appendChild(el("title", {}, d.month + ": " + fmtInt(d.users) + " users"));
      svg.appendChild(dot);
      svg.appendChild(el("text", { x: cx, y: cy - 12, "text-anchor": "middle", class: "dot-label" }, fmtInt(d.users)));
      svg.appendChild(el("text", { x: cx, y: m.top + ih + 20, "text-anchor": "middle", class: "tick-text" }, d.month));
    });

    document.getElementById("lineChart").appendChild(svg);
  }

  renderKpis();
  renderBarChart();
  renderLineChart();
</script>
</body>
</html>
