<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<style>
  :root { --bg:#f4f5f7; --card:#fff; --line:#e2e4e9; --text:#2b2d31; --muted:#8a8f98; --accent:#4f6df5; }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.4 system-ui, sans-serif; background:var(--bg); color:var(--text);
         display:flex; justify-content:center; padding:40px 16px; }
  main { width:100%; max-width:480px; }
  h1 { font-size:24px; margin:0 0 16px; text-align:center; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  form { display:flex; border-bottom:1px solid var(--line); }
  #new { flex:1; border:0; padding:14px 16px; font:inherit; outline:none; background:transparent; }
  form button { border:0; background:var(--accent); color:#fff; padding:0 18px; font:inherit; cursor:pointer; }
  ul { list-style:none; margin:0; padding:0; }
  li { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); }
  li:last-child { border-bottom:0; }
  li input[type=checkbox] { width:18px; height:18px; flex:none; cursor:pointer; accent-color:var(--accent); }
  .label { flex:1; word-break:break-word; }
  .done .label { text-decoration:line-through; color:var(--muted); }
  .del { border:0; background:transparent; color:var(--muted); font-size:20px; line-height:1; cursor:pointer; padding:4px 6px; border-radius:6px; }
  .del:hover { background:var(--bg); color:#e5484d; }
  .empty { padding:24px 16px; text-align:center; color:var(--muted); }
  footer { display:flex; align-items:center; justify-content:space-between; gap:8px;
           padding:12px 16px; border-top:1px solid var(--line); font-size:14px; color:var(--muted); flex-wrap:wrap; }
  .filters { display:flex; gap:4px; }
  .filters button { border:1px solid transparent; background:transparent; color:var(--muted);
                    padding:4px 10px; border-radius:6px; font:inherit; cursor:pointer; }
  .filters button:hover { border-color:var(--line); }
  .filters button[aria-pressed=true] { color:var(--accent); border-color:var(--accent); }
</style>
</head>
<body>
<main>
  <h1>Todo</h1>
  <div class="card">
    <form id="form">
      <input id="new" placeholder="What needs doing?" autocomplete="off" aria-label="New todo">
      <button type="submit">Add</button>
    </form>
    <ul id="list"></ul>
    <footer>
      <span id="count"></span>
      <div class="filters" role="group" aria-label="Filter todos">
        <button data-filter="all">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Completed</button>
      </div>
    </footer>
  </div>
</main>
<script>
const KEY = "todos.v1";
const list = document.getElementById("list");
const count = document.getElementById("count");
const form = document.getElementById("form");
const input = document.getElementById("new");

let todos = load();
let filter = "all";

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; } // ponytail: corrupt/blocked storage -> start empty
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(todos)); } catch {} }

function render() {
  const shown = todos.filter(t =>
    filter === "active" ? !t.done : filter === "completed" ? t.done : true);

  list.innerHTML = "";
  if (!shown.length) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = todos.length ? "Nothing here." : "No todos yet.";
    list.appendChild(li);
  } else {
    for (const t of shown) {
      const li = document.createElement("li");
      if (t.done) li.className = "done";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = t.done;
      cb.setAttribute("aria-label", "Toggle complete");
      cb.onchange = () => { t.done = cb.checked; save(); render(); };

      const span = document.createElement("span");
      span.className = "label";
      span.textContent = t.text; // textContent avoids HTML injection

      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "×";
      del.title = "Delete";
      del.setAttribute("aria-label", "Delete todo");
      del.onclick = () => { todos = todos.filter(x => x.id !== t.id); save(); render(); };

      li.append(cb, span, del);
      list.appendChild(li);
    }
  }

  const left = todos.filter(t => !t.done).length;
  count.textContent = `${left} item${left === 1 ? "" : "s"} left`;

  for (const b of document.querySelectorAll(".filters button"))
    b.setAttribute("aria-pressed", b.dataset.filter === filter);
}

form.onsubmit = e => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  todos.push({ id: Date.now() + Math.random(), text, done: false });
  input.value = "";
  save();
  render();
};

for (const b of document.querySelectorAll(".filters button"))
  b.onclick = () => { filter = b.dataset.filter; render(); };

render();
</script>
</body>
</html>
